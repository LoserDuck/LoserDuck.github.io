    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff;
            --text-sub: #8b95a1;
            --accent-blue: #3182f6;
            --accent-pink: #ff2d55;
            --error-red: #ff3b30;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-title); 
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header --- */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--card-border); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(49, 130, 246, 0.15); border: 1px solid rgba(49, 130, 246, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-blue); font-weight: 700; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 32px; animation: fadeIn 0.6s ease-out; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; word-break: keep-all; }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .app-box { 
            width: 100%; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 24px; 
            padding: 24px; display: flex; flex-direction: column; gap: 20px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .textarea-wrapper { position: relative; width: 100%; }
        textarea { 
            width: 100%; height: 320px; 
            background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; padding: 20px; padding-bottom: 50px;
            color: #fff; font-size: 15px; line-height: 1.6; 
            resize: none; outline: none; transition: all 0.3s; 
        }
        textarea:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 4px rgba(49, 130, 246, 0.1); }
        textarea::placeholder { color: #555; }
        
        .stats-dashboard {
            position: absolute; bottom: 12px; left: 16px; right: 16px;
            display: flex; justify-content: space-between; align-items: center;
            font-size: 12px; font-weight: 600;
        }
        .stat-item { display: flex; align-items: center; gap: 6px; color: var(--text-sub); transition: color 0.3s; }
        .stat-item.error { color: var(--error-red); animation: shake 0.4s; }
        
        .progress-bar-bg { position: absolute; bottom: 0; left: 0; height: 3px; background: rgba(255,255,255,0.05); width: 100%; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--accent-blue); transition: width 0.3s ease, background-color 0.3s; }
        .progress-bar-fill.warning { background: var(--accent-pink); }
        .progress-bar-fill.error { background: var(--error-red); }

        .btn-group { display: flex; gap: 12px; }
        .btn { 
            padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 700; 
            cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); 
            display: flex; justify-content: center; align-items: center; gap: 8px; 
        }
        .btn-primary { 
            flex: 1; background: var(--accent-blue); color: #fff; 
            background-image: linear-gradient(135deg, #3182f6 0%, #1e62c9 100%);
            box-shadow: 0 8px 20px rgba(49, 130, 246, 0.25); 
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 12px 25px rgba(49, 130, 246, 0.4); }
        .btn-primary:active { transform: translateY(1px); scale: 0.98; }
        
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-sub); width: 64px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* --- Footer Brand --- */
        .footer-brand { margin-top: 40px; margin-bottom: 20px; font-size: 13px; font-weight: 600; color: #555; text-align: center; width: 100%; }
        .powered-by { font-weight: 400; color: #777; margin-top: 6px; font-size: 12px; }
        .duck-logo { color: #fff; }

        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); 
            background: rgba(52, 199, 89, 0.9); backdrop-filter: blur(10px);
            color: #fff; padding: 14px 28px; border-radius: 100px; 
            font-weight: 600; font-size: 15px; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3); z-index: 2000; 
            display: flex; align-items: center; gap: 10px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }

    </style>
</head>
<body>

    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100">
                <defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs>
                <path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/>
            </svg>
            1SecTools
        </a>
        <span class="header-badge">인스타 공백 변환기 ✨</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>완벽한 인스타 공백 변환</h1>
            <p>작성한 줄바꿈 그대로 인스타에 1초 만에 복사하세요.<br>글자 수와 해시태그 제한을 실시간으로 분석합니다.</p>
        </div>

        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="app-box">
            <div class="textarea-wrapper">
                <textarea id="inputText" placeholder="여기에 인스타그램 본문을 작성하세요...&#10;&#10;마음껏 줄바꿈을 하셔도 인스타에서 절대 뭉개지지 않습니다!"></textarea>
                
                <div class="stats-dashboard">
                    <div class="stat-item" id="tagStat">
                        <span>#</span> <span id="tagCount">0</span> / 30
                    </div>
                    <div class="stat-item" id="charStat">
                        <span id="charCount">0</span> / 2200자
                    </div>
                </div>
                
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressBar"></div>
                </div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="clearText()" title="초기화">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
                <button class="btn btn-primary" onclick="convertAndCopy()" id="copyBtn">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    변환 및 1초 복사
                </button>
            </div>
        </div>

        <!-- 🦆 Footer Branding -->
        <div class="footer-brand">
            <div>&copy; 2026 1SecTools. All rights reserved.</div>
            <div class="powered-by">Powered by <span class="duck-logo">🦆 LoserDuck</span></div>
        </div>
    </main>

    <div class="toast" id="toast">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
        <span>복사 완료! 인스타에 바로 붙여넣기 하세요.</span>
    </div>

    <script>
        const input = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const tagCount = document.getElementById('tagCount');
        const charStat = document.getElementById('charStat');
        const tagStat = document.getElementById('tagStat');
        const progressBar = document.getElementById('progressBar');
        const toast = document.getElementById('toast');
        const copyBtn = document.getElementById('copyBtn');

        input.addEventListener('input', () => {
            const text = input.value;
            const length = text.length;
            
            // 🚨 수정된 정규식: # 뒤에 공백이나 또 다른 #이 오기 전까지를 하나의 태그로 인식
            const tags = text.match(/#[^\s#]+/g);
            const numTags = tags ? tags.length : 0;

            charCount.innerText = length;
            tagCount.innerText = numTags;

            let percent = (length / 2200) * 100;
            if(percent > 100) percent = 100;
            progressBar.style.width = `${percent}%`;

            progressBar.className = 'progress-bar-fill';
            charStat.className = 'stat-item';
            tagStat.className = 'stat-item';

            if (length > 2200) { charStat.classList.add('error'); progressBar.classList.add('error'); } 
            else if (length > 2000) { progressBar.classList.add('warning'); }
            if (numTags > 30) { tagStat.classList.add('error'); }
        });

        function clearText() { input.value = ''; input.dispatchEvent(new Event('input')); input.focus(); }

        function convertAndCopy() {
            if(!input.value.trim()) {
                input.focus();
                copyBtn.style.animation = 'shake 0.4s';
                setTimeout(() => copyBtn.style.animation = '', 400);
                return;
            }
            let text = input.value;
            text = text.replace(/(?:\r\n|\r|\n)/g, '\n'); 
            const lines = text.split('\n');
            const converted = lines.map(line => { if (line.trim() === '') return '\u2800'; return line; });
            text = converted.join('\n');
            
            navigator.clipboard.writeText(text).then(() => { triggerSuccess(); }).catch(() => {
                const temp = document.createElement('textarea');
                temp.value = text; document.body.appendChild(temp);
                temp.select(); document.execCommand('copy'); document.body.removeChild(temp);
                triggerSuccess();
            });
        }

        function triggerSuccess() {
            toast.classList.add('show');
            copyBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg> 성공적으로 복사됨!';
            copyBtn.style.background = '#34c759'; copyBtn.style.boxShadow = '0 8px 20px rgba(52, 199, 89, 0.3)';
            
            setTimeout(() => {
                toast.classList.remove('show');
                copyBtn.innerHTML = '<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg> 변환 및 1초 복사';
                copyBtn.style.background = ''; copyBtn.style.boxShadow = '';
            }, 2500);
        }
    </script>
</body>
