    <style>
        :root { 
            --bg-base: #030305; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); 
            --text-title: #ffffff; --text-sub: #8b95a1; 
            --accent-pink: #ff2d55; 
            --grad-pink: linear-gradient(135deg, #ff2d55 0%, #e01b41 100%);
            --error-red: #ff3b30; --accent-green: #34c759; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        
        /* 🚨 핵심 변경점: 메인 페이지와 100% 동일한 고급 오로라 배경 (다크테마) 적용 */
        body { 
            background-color: var(--bg-base); 
            color: var(--text-title); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden; 
            
            /* 좌측 상단 옅은 파랑, 우측 하단 옅은 보라빛 (8% 투명도) 방사형 그라데이션 */
            background-image: 
                radial-gradient(circle at 10% 0%, rgba(49, 130, 246, 0.08) 0%, transparent 45%),
                radial-gradient(circle at 90% 100%, rgba(175, 82, 222, 0.08) 0%, transparent 50%);
            background-attachment: fixed; /* 스크롤 시 배경 질감 고정 */
        }

        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        
        .header-logo { font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
        .header-badge { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: rgba(255, 45, 85, 0.15); border: 1px solid rgba(255, 45, 85, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-pink); font-weight: 700; }

        .scale-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; transform-origin: top center; }
        @media (min-width: 2500px) { .scale-wrapper { transform: scale(1.3); margin-bottom: 250px; } }
        @media (min-width: 3800px) { .scale-wrapper { transform: scale(1.7); margin-bottom: 450px; } }

        .main { padding: 60px 20px 40px; flex: 1; display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 650px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 28px; animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
        .title-sec h1 { font-size: clamp(28px, 5vw, 36px); font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; line-height: 1.3; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }

        .secure-badge { 
            display: inline-flex; align-items: center; gap: 6px; 
            background: rgba(52, 199, 89, 0.05); border: 1px solid rgba(52, 199, 89, 0.3); 
            padding: 8px 16px; border-radius: 100px; 
            font-size: 13px; font-weight: 700; color: var(--accent-green); 
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.1);
        }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .app-box { width: 100%; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 24px; padding: 24px; display: flex; flex-direction: column; gap: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .textarea-wrapper { position: relative; width: 100%; }
        
        textarea { width: 100%; height: 320px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px; padding-bottom: 50px; color: #fff; font-size: 15px; line-height: 1.6; resize: none; outline: none; transition: all 0.3s; }
        textarea:focus { border-color: var(--accent-pink); box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15); }
        
        .stats-dashboard { position: absolute; bottom: 12px; left: 16px; right: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; }
        .stat-item { display: flex; align-items: center; gap: 6px; color: var(--text-sub); transition: color 0.3s; }
        .stat-item.error { color: var(--error-red); }
        
        .progress-bar-bg { position: absolute; bottom: 0; left: 0; height: 3px; background: rgba(255,255,255,0.05); width: 100%; border-bottom-left-radius: 16px; border-bottom-right-radius: 16px; overflow: hidden; }
        .progress-bar-fill { height: 100%; width: 0%; background: var(--grad-pink); transition: width 0.3s ease; }

        .btn-group { display: flex; gap: 12px; }
        .btn { padding: 18px; border-radius: 16px; font-size: 16px; font-weight: 800; cursor: pointer; border: none; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); display: flex; justify-content: center; align-items: center; gap: 8px; }
        
        .btn-primary { flex: 1; background: var(--grad-pink); color: #fff; box-shadow: 0 8px 20px rgba(255, 45, 85, 0.3); }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 45, 85, 0.4); }
        .btn-primary:active { transform: translateY(2px) scale(0.98); box-shadow: 0 4px 10px rgba(255, 45, 85, 0.2); }
        
        .btn-secondary { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: var(--text-sub); width: 64px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .btn-secondary:active { transform: scale(0.95); }

        .footer { width: 100%; border-top: 1px solid var(--card-border); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); margin-top: auto; }
        .footer-logo { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 900; color: #555; letter-spacing: -0.5px; }
        .footer-copy { font-family: 'Inter', sans-serif; color: #555; font-size: 13px; font-weight: 500; text-align: center; line-height: 1.5; }
        
        .duck-logo { color: #888; font-weight: 700; transition: color 0.3s; }
        .duck-logo:hover { color: #fff; }

        .toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(52, 199, 89, 0.9); backdrop-filter: blur(10px); color: #fff; padding: 14px 28px; border-radius: 100px; font-weight: 600; font-size: 15px; opacity: 0; pointer-events: none; transition: all 0.4s; z-index: 2000; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

<body>
    <header class="header">
        <a href="../" class="header-logo">
            <svg width="28" height="28" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
        <span class="header-badge">인스타 공백 변환기</span>
    </header>

    <div class="scale-wrapper">
        <main class="main">
            <div class="title-sec">
                <h1>인스타 공백 변환기</h1>
                <p>작성한 줄바꿈 그대로 인스타에 1초 만에 복사하세요.</p>
                <div class="secure-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    100% 안전: 브라우저 자체 처리 (서버 저장 X)
                </div>
            </div>

            <div class="ad-container"><ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>

            <div class="app-box">
                <div class="textarea-wrapper">
                    <textarea id="inputText" placeholder="여기에 본문을 작성하세요..."></textarea>
                    <div class="stats-dashboard">
                        <div class="stat-item" id="tagStat"><span>#</span> <span id="tagCount">0</span> / 30</div>
                        <div class="stat-item" id="charStat"><span id="charCount">0</span> / 2200자</div>
                    </div>
                    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressBar"></div></div>
                </div>
                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="clearText()"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></button>
                    <button class="btn btn-primary" onclick="convertAndCopy()" id="copyBtn"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>변환 및 복사</button>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-logo">1SecTools</div>
        <div class="footer-copy">
            &copy; 2026 1SecTools. All rights reserved.<br>
            Designed & Engineered by <span class="duck-logo">🦆 LoserDuck</span>
        </div>
    </footer>

    <div class="toast" id="toast"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg><span>복사 완료! 인스타에 붙여넣으세요.</span></div>

    <script>
        const input = document.getElementById('inputText');
        const charCount = document.getElementById('charCount');
        const tagCount = document.getElementById('tagCount');
        const charStat = document.getElementById('charStat');
        const tagStat = document.getElementById('tagStat');
        const progressBar = document.getElementById('progressBar');
        const toast = document.getElementById('toast');
        const copyBtn = document.getElementById('copyBtn');

        input.addEventListener('input', () => {
            const text = input.value;
            const length = text.length;
            const tags = text.match(/#[^\s#]+/g);
            const numTags = tags ? tags.length : 0;

            charCount.innerText = length; tagCount.innerText = numTags;
            let percent = (length / 2200) * 100; if(percent > 100) percent = 100;
            progressBar.style.width = `${percent}%`;

            if (length > 2200) { charStat.classList.add('error'); } else { charStat.classList.remove('error'); }
            if (numTags > 30) { tagStat.classList.add('error'); } else { tagStat.classList.remove('error'); }
        });

        function clearText() { 
            input.value = ''; 
            input.dispatchEvent(new Event('input')); 
            input.focus(); 
        }

        function convertAndCopy() {
            if(!input.value.trim()) { input.focus(); return; }
            let text = input.value.replace(/(?:\r\n|\r|\n)/g, '\n'); 
            const lines = text.split('\n');
            const converted = lines.map(line => { if (line.trim() === '') return '\u2800'; return line; });
            text = converted.join('\n');
            
            navigator.clipboard.writeText(text).then(() => { triggerSuccess(); }).catch(() => {
                const temp = document.createElement('textarea'); temp.value = text; document.body.appendChild(temp);
                temp.select(); document.execCommand('copy'); document.body.removeChild(temp); triggerSuccess();
            });
        }
        function triggerSuccess() { toast.classList.add('show'); setTimeout(() => { toast.classList.remove('show'); }, 2500); }
    </script>
</body>
