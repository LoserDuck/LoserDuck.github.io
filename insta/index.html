<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>인스타 공백 변환기 | 1SecTools</title>
    
    <!-- 1SecTools Custom Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff;
            --text-sub: #8b95a1;
            --accent-blue: #3182f6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Inter", sans-serif; }
        
        body { 
            background-color: var(--bg-base); 
            color: var(--text-title); 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header --- */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(15px); 
            border-bottom: 1px solid var(--card-border); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(255,255,255,0.06); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--text-sub); font-weight: 600; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 32px; }
        .title-sec h1 { font-size: 28px; font-weight: 800; margin-bottom: 10px; letter-spacing: -0.5px; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; }

        /* --- App UI --- */
        .app-box { 
            width: 100%; background: var(--card-bg); 
            border: 1px solid var(--card-border); border-radius: 24px; 
            padding: 24px; display: flex; flex-direction: column; gap: 16px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        
        .textarea-wrapper { position: relative; width: 100%; }
        textarea { 
            width: 100%; height: 320px; 
            background: rgba(0,0,0,0.3); border: 1px solid var(--card-border); 
            border-radius: 16px; padding: 20px; padding-bottom: 40px;
            color: #fff; font-size: 15px; line-height: 1.6; 
            resize: none; outline: none; transition: border-color 0.2s; 
        }
        textarea:focus { border-color: var(--accent-blue); }
        textarea::placeholder { color: #555; }
        
        .char-count { 
            position: absolute; bottom: 16px; right: 16px; 
            font-size: 12px; color: var(--text-sub); font-weight: 600;
        }

        .btn-group { display: flex; gap: 12px; }
        .btn { 
            padding: 16px; border-radius: 16px; font-size: 16px; font-weight: 700; 
            cursor: pointer; border: none; transition: all 0.2s; 
            display: flex; justify-content: center; align-items: center; gap: 8px; 
        }
        .btn-primary { 
            flex: 1; background: var(--accent-blue); color: #fff; 
            box-shadow: 0 4px 15px rgba(49, 130, 246, 0.3); 
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(49, 130, 246, 0.4); background: #408bf7; }
        .btn-primary:active { transform: translateY(0); }
        
        .btn-secondary { background: rgba(255,255,255,0.05); color: var(--text-sub); width: 60px; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* --- Toast Notification --- */
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); 
            background: #34c759; color: #fff; padding: 14px 28px; border-radius: 100px; 
            font-weight: 600; font-size: 14px; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3); z-index: 2000; 
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        
    </style>
</head>
<body>

    <!-- ⚡ 1SecTools 공통 글로벌 헤더 -->
    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#3182f6"/>
                        <stop offset="100%" stop-color="#ff2d55"/>
                    </linearGradient>
                </defs>
                <path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/>
            </svg>
            1SecTools
        </a>
        <span class="header-badge">인스타 공백 변환기</span>
    </header>

    <!-- ⚡ 메인 워크스페이스 -->
    <main class="main">
        <div class="title-sec">
            <h1>인스타그램 줄바꿈 변환</h1>
            <p>작성하신 텍스트의 줄바꿈과 띄어쓰기를<br>인스타그램에 완벽하게 적용되도록 1초 만에 변환해 드립니다.</p>
        </div>

        <div class="app-box">
            <div class="textarea-wrapper">
                <textarea id="inputText" placeholder="여기에 인스타그램에 올릴 글을 작성하세요...&#10;&#10;줄바꿈도 자유롭게 하시면 됩니다!"></textarea>
                <div class="char-count"><span id="count">0</span>자</div>
            </div>
            
            <div class="btn-group">
                <button class="btn btn-secondary" onclick="clearText()" title="초기화">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                </button>
                <button class="btn btn-primary" onclick="convertAndCopy()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                    변환 및 1초 복사
                </button>
            </div>
        </div>
    </main>

    <!-- ⚡ 알림창 (Toast) -->
    <div class="toast" id="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        성공적으로 복사되었습니다! 인스타에 붙여넣기 하세요.
    </div>

    <script>
        const input = document.getElementById('inputText');
        const count = document.getElementById('count');
        const toast = document.getElementById('toast');

        // 글자 수 실시간 카운팅
        input.addEventListener('input', () => {
            count.innerText = input.value.length;
        });

        // 텍스트 전체 지우기
        function clearText() {
            input.value = '';
            count.innerText = '0';
            input.focus();
        }

        // 변환 및 클립보드 복사
        function convertAndCopy() {
            if(!input.value.trim()) {
                input.focus();
                return;
            }
            
            let text = input.value;
            // 빈 줄바꿈을 인스타그램이 인식할 수 있는 보이지 않는 공백(\u2800)으로 변환
            text = text.replace(/(?:\r\n|\r|\n)/g, '\n'); 
            text = text.replace(/\n\n/g, '\n\u2800\n');
            
            // 클립보드 복사 로직
            navigator.clipboard.writeText(text).then(() => {
                showToast();
            }).catch(() => {
                // 구형 브라우저 지원용 Fallback
                const tempInput = document.createElement('textarea');
                tempInput.value = text;
                document.body.appendChild(tempInput);
                tempInput.select();
                document.execCommand('copy');
                document.body.removeChild(tempInput);
                showToast();
            });
        }

        // 토스트 알림 띄우기
        function showToast() {
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
