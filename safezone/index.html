<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- ✅ SEO Optimization (Global) -->
    <title>Shorts & TikTok Safe Zone Simulator | 1SecTools</title>
    <meta name="description" content="Preview your short-form videos to ensure text isn't blocked by TikTok, Reels, or Shorts UI. Instantly check the safe zones.">
    <meta name="keywords" content="tiktok safe zone, youtube shorts safe zone, instagram reels safe zone, video preview, safe zone template">
    
    <!-- ✅ Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- ✅ Google Analytics, Search Console, AdSense -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-4PG2DEJS2P"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-4PG2DEJS2P');

    <meta name="google-site-verification" content="KC_FGR3LD6TwJWG73cK14iJu44l-nzTBk9AvjvW4Mo8" />
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7273110716268085" crossorigin="anonymous"></script>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <style>
        :root {
            --bg-base: #030305; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff; --text-sub: #8b95a1; --accent-cyan: #32ade6; --danger: rgba(255, 59, 48, 0.55);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-title); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; }

        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(50, 173, 230, 0.15); border: 1px solid rgba(50, 173, 230, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        .title-sec { text-align: center; margin-bottom: 24px; animation: fadeIn 0.6s ease-out; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; word-break: keep-all; }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* UI Control Panel */
        .controls { display: flex; gap: 8px; margin-bottom: 24px; background: var(--card-bg); padding: 8px; border-radius: 16px; border: 1px solid var(--card-border); }
        .platform-btn { flex: 1; padding: 12px 16px; border: none; background: transparent; color: var(--text-sub); font-weight: 700; border-radius: 10px; cursor: pointer; transition: all 0.2s; font-size: 14px; white-space: nowrap; }
        .platform-btn.active { background: rgba(255,255,255,0.1); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

        /* Phone Preview Simulator */
        .simulator-wrapper { position: relative; width: 100%; max-width: 340px; aspect-ratio: 9/16; background: #000; border-radius: 36px; border: 8px solid #222; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        .upload-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; cursor: pointer; background: rgba(0,0,0,0.6); transition: background 0.3s; }
        .upload-overlay:hover { background: rgba(0,0,0,0.4); }
        .upload-icon { color: var(--text-sub); margin-bottom: 12px; }
        .upload-text { color: #fff; font-weight: 700; font-size: 15px; }
        .hidden-file { display: none; }

        .preview-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; display: none; }

        /* Safe Zone Danger Overlays */
        .danger-zone { position: absolute; background: var(--danger); z-index: 20; display: none; pointer-events: none; border: 1px dashed rgba(255,255,255,0.3); }
        .danger-zone::after { 
            content: 'BLOCKED'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; 
            color: rgba(255,255,255,0.8); font-weight: 800; font-size: 11px; letter-spacing: 1px; transform: rotate(-90deg);
        }
        .zone-horizontal::after { transform: rotate(0deg); } /* Bottom/Top zones text upright */
        
        /* Shorts Zones */
        .zone-shorts-right { right: 0; bottom: 80px; width: 65px; height: 250px; }
        .zone-shorts-bottom { left: 0; bottom: 0; width: 100%; height: 150px; }
        .zone-shorts-top { left: 0; top: 0; width: 100%; height: 60px; }

        /* TikTok Zones */
        .zone-tiktok-right { right: 0; bottom: 20px; width: 65px; height: 300px; }
        .zone-tiktok-bottom { left: 0; bottom: 0; width: 80%; height: 160px; }
        
        /* Reels Zones */
        .zone-reels-right { right: 0; bottom: 40px; width: 60px; height: 260px; }
        .zone-reels-bottom { left: 0; bottom: 0; width: 100%; height: 140px; }

        .footer-brand { margin-top: 40px; margin-bottom: 20px; font-size: 13px; font-weight: 600; color: #555; text-align: center; width: 100%; }
        .powered-by { font-weight: 400; color: #777; margin-top: 6px; font-size: 12px; }
        .duck-logo { color: #fff; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
        <span class="header-badge">Safe Zone 📱</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>Safe Zone Simulator</h1>
            <p>The <span style="color:var(--error-red);font-weight:700;">red areas</span> show where platform UI (Likes, Title) will block your video. Keep your text away from these zones!</p>
        </div>

        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="controls">
            <button class="platform-btn active" onclick="setPlatform('shorts')">YT Shorts</button>
            <button class="platform-btn" onclick="setPlatform('tiktok')">TikTok</button>
            <button class="platform-btn" onclick="setPlatform('reels')">IG Reels</button>
        </div>

        <div class="simulator-wrapper">
            <!-- User Uploaded Image -->
            <img id="previewImg" class="preview-img" src="" alt="preview">
            
            <!-- Upload Overlay -->
            <label class="upload-overlay" id="uploadLabel">
                <svg class="upload-icon" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                <span class="upload-text">Tap to upload image</span>
                <input type="file" id="fileInput" class="hidden-file" accept="image/*">
            </label>

            <!-- Danger Zones -->
            <!-- Shorts -->
            <div class="danger-zone zone-shorts-right plat-shorts" style="display:block;"></div>
            <div class="danger-zone zone-horizontal zone-shorts-bottom plat-shorts" style="display:block;"></div>
            <div class="danger-zone zone-horizontal zone-shorts-top plat-shorts" style="display:block;"></div>
            <!-- TikTok -->
            <div class="danger-zone zone-tiktok-right plat-tiktok"></div>
            <div class="danger-zone zone-horizontal zone-tiktok-bottom plat-tiktok"></div>
            <!-- Reels -->
            <div class="danger-zone zone-reels-right plat-reels"></div>
            <div class="danger-zone zone-horizontal zone-reels-bottom plat-reels"></div>
        </div>

        <div class="footer-brand">
            <div>&copy; 2026 1SecTools. All rights reserved.</div>
            <div class="powered-by">Powered by <span class="duck-logo">🦆 LoserDuck</span></div>
        </div>
    </main>

    <script>
        const fileInput = document.getElementById('fileInput');
        const previewImg = document.getElementById('previewImg');
        const uploadLabel = document.getElementById('uploadLabel');
        const btns = document.querySelectorAll('.platform-btn');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    previewImg.src = event.target.result;
                    previewImg.style.display = 'block';
                    
                    // Remove background, leave a small button to change image
                    uploadLabel.style.background = 'transparent';
                    uploadLabel.innerHTML = '<span style="position:absolute; top:20px; background:rgba(0,0,0,0.6); padding:6px 12px; border-radius:10px; font-size:12px; color:#fff; font-weight:600; border:1px solid rgba(255,255,255,0.2);">Tap to change image</span><input type="file" id="fileInput2" class="hidden-file" accept="image/*">';
                    
                    document.getElementById('fileInput2').addEventListener('change', (e) => {
                        fileInput.files = e.target.files;
                        fileInput.dispatchEvent(new Event('change'));
                    });
                };
                reader.readAsDataURL(file);
            }
        });

        function setPlatform(platform) {
            btns.forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('.danger-zone').forEach(el => el.style.display = 'none');
            document.querySelectorAll(`.plat-${platform}`).forEach(el => el.style.display = 'block');
        }
    </script>
</body>
</html>
