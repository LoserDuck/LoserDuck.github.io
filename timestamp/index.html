<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>유튜브 타임스탬프 메이커 | 1SecTools</title>
    <meta name="description" content="숫자만 치면 콜론(:)이 자동 입력되며 시간순으로 정렬됩니다. 데이터는 서버에 저장되지 않고 로컬에서 처리됩니다.">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7273110716268085" crossorigin="anonymous"></script>

    <style>
        :root { --bg-base: #030305; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); --text-title: #ffffff; --text-sub: #8b95a1; --accent-purple: #af52de; --error-red: #ff3b30; --accent-green: #34c759;}
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-title); min-height: 100vh; display: flex; flex-direction: column; }

        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; }
        .header-badge { background: rgba(175, 82, 222, 0.15); border: 1px solid rgba(175, 82, 222, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-purple); font-weight: 700; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        .title-sec { text-align: center; margin-bottom: 32px; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .input-panel { width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .input-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 120px; }
        .input-group label { font-size: 13px; font-weight: 600; color: var(--text-sub); }
        .input-group input { width: 100%; height: 52px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0 16px; color: #fff; font-size: 16px; outline: none; }
        .input-group input:focus { border-color: var(--accent-purple); }
        
        .add-btn { width: 100%; height: 52px; border-radius: 12px; font-size: 16px; font-weight: 700; background: var(--accent-purple); color: #fff; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }

        .list-panel { width: 100%; border: 1px solid var(--card-border); border-radius: 20px; background: rgba(0,0,0,0.2); overflow: hidden; }
        .list-header { padding: 16px 20px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--card-border); display: flex; justify-content: space-between; align-items: center; }
        .list-header h3 { font-size: 15px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
        .list-count { font-size: 13px; color: var(--text-sub); background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }
        
        .chapter-list { min-height: 100px; max-height: 400px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chapter-item { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; }
        .chap-time { font-weight: 700; color: var(--accent-purple); width: 64px; flex-shrink: 0; }
        .chap-title { flex: 1; color: #fff; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-btn { background: none; border: none; color: #666; cursor: pointer; padding: 4px; border-radius: 6px; }
        
        .action-area { width: 100%; display: flex; gap: 12px; margin-top: 16px; }
        .btn-copy { flex: 1; height: 56px; border-radius: 14px; border: none; background: #fff; color: #000; font-size: 16px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px; }

        @media (min-width: 2500px) {
            .main { max-width: 800px; }
            .title-sec h1 { font-size: 44px; }
            .input-group input { height: 64px; font-size: 20px; }
            .add-btn, .btn-copy { height: 64px; font-size: 20px; }
            .chap-title { font-size: 18px; }
        }

        .footer { width: 100%; border-top: 1px solid var(--card-border); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); margin-top: auto; }
        .footer-logo { font-size: 20px; font-weight: 900; color: #555; }
        .secure-text { font-size: 12px; font-weight: 600; color: var(--accent-green); display: flex; align-items: center; gap: 4px; }
        .footer-copy { color: #555; font-size: 13px; font-weight: 500; text-align: center; }
    </style>
</head>
<body>
    <header class="header">
        <a href="../" class="header-logo"><svg width="24" height="24" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>1SecTools</a>
        <span class="header-badge">챕터 메이커 ⏱️</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>초고속 챕터 생성</h1>
            <p>순서 상관없이 숫자만 치면 시간순으로 자동 정렬됩니다.</p>
        </div>

        <div class="ad-container"><ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>

        <div class="input-panel">
            <div class="input-row">
                <div class="input-group" style="flex:1;"><label>시간 (숫자만)</label><input type="text" id="timeInput" placeholder="0130"></div>
                <div class="input-group" style="flex:3;"><label>제목</label><input type="text" id="titleInput" placeholder="장면 설명"></div>
            </div>
            <button class="add-btn" onclick="addChapter()">목록에 추가 (Enter)</button>
        </div>

        <div class="list-panel">
            <div class="list-header">
                <h3>목록 <span style="font-size:11px;color:var(--accent-purple);background:rgba(175,82,222,0.15);padding:2px 6px;border-radius:6px;">자동정렬</span></h3>
                <span class="list-count" id="listCount">0개</span>
            </div>
            <div class="chapter-list" id="chapterList">
                <div id="emptyState" style="padding:40px;text-align:center;color:#555;font-size:14px;">추가된 챕터가 없습니다.</div>
            </div>
        </div>

        <div class="action-area">
            <button class="btn-copy" onclick="copyToClipboard()">유튜브용 복사하기</button>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">1SecTools</div>
        <div class="secure-text"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> 100% 안전: 데이터가 저장되지 않습니다.</div>
        <div class="footer-copy">&copy; 2026 1SecTools. All rights reserved.</div>
    </footer>

    <script>
        const timeInput = document.getElementById('timeInput');
        const titleInput = document.getElementById('titleInput');
        const chapterList = document.getElementById('chapterList');
        const emptyState = document.getElementById('emptyState');
        const listCount = document.getElementById('listCount');
        let chapters = [];

        timeInput.addEventListener('input', function() {
            let val = this.value.replace(/[^0-9]/g, '');
            if(val.length > 4) val = val.substring(0, val.length - 4) + ':' + val.substring(val.length - 4, val.length - 2) + ':' + val.substring(val.length - 2);
            else if (val.length > 2) val = val.substring(0, val.length - 2) + ':' + val.substring(val.length - 2);
            this.value = val;
        });

        timeInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') titleInput.focus(); });
        titleInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addChapter(); });

        function timeToSeconds(t) { const p = t.split(':').reverse(); let s=0; for(let i=0;i<p.length;i++) s+=parseInt(p[i]||0,10)*Math.pow(60,i); return s; }

        function addChapter() {
            const time = timeInput.value.trim(); const title = titleInput.value.trim();
            if(!time || !title) return;
            chapters.push({ time, title });
            chapters.sort((a, b) => timeToSeconds(a.time) - timeToSeconds(b.time));
            renderList();
            timeInput.value = ''; titleInput.value = ''; timeInput.focus();
        }

        function renderList() {
            if(chapters.length === 0) { emptyState.style.display = 'block'; listCount.innerText = '0개'; chapterList.innerHTML = ''; chapterList.appendChild(emptyState); return; }
            emptyState.style.display = 'none'; listCount.innerText = `${chapters.length}개`;
            chapterList.innerHTML = '';
            chapters.forEach((chap, i) => {
                const div = document.createElement('div'); div.className = 'chapter-item';
                div.innerHTML = `<div class="chap-time">${chap.time}</div><div class="chap-title">${chap.title}</div><button class="del-btn" onclick="chapters.splice(${i},1);renderList();">X</button>`;
                chapterList.appendChild(div);
            });
        }

        function copyToClipboard() {
            if(chapters.length===0) return;
            let res = '';
            if(timeToSeconds(chapters[0].time) !== 0) res += '00:00 도입부\n';
            chapters.forEach(c => res += `${c.time} ${c.title}\n`);
            navigator.clipboard.writeText(res).then(() => alert('복사 완료!'));
        }
    </script>
</body>
</html>
