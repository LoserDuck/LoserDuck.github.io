    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff;
            --text-sub: #8b95a1;
            --accent-purple: #af52de;
            --accent-blue: #3182f6;
            --error-red: #ff3b30;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Inter", sans-serif; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-title); 
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header --- */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--card-border); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(175, 82, 222, 0.15); border: 1px solid rgba(175, 82, 222, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-purple); font-weight: 700; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 32px; animation: fadeIn 0.6s ease-out; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; word-break: keep-all; }

        /* --- Ad Box --- */
        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- Input Panel --- */
        .input-panel { 
            width: 100%; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 20px; 
            padding: 24px; display: flex; flex-direction: column; gap: 16px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); margin-bottom: 24px;
        }

        .input-row { display: flex; gap: 12px; align-items: stretch; flex-wrap: wrap; }
        
        .time-input-group { flex: 1; min-width: 120px; display: flex; flex-direction: column; gap: 8px; }
        .title-input-group { flex: 3; min-width: 200px; display: flex; flex-direction: column; gap: 8px; }
        
        .input-panel label { font-size: 13px; font-weight: 600; color: var(--text-sub); }
        .input-panel input { 
            width: 100%; height: 52px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; 
            padding: 0 16px; color: #fff; font-size: 16px; outline: none; transition: border 0.3s;
        }
        .input-panel input:focus { border-color: var(--accent-purple); box-shadow: 0 0 0 3px rgba(175, 82, 222, 0.15); }
        .input-panel input::placeholder { color: #555; }
        
        .add-btn { 
            width: 100%; height: 52px; border-radius: 12px; font-size: 16px; font-weight: 700; 
            background: var(--accent-purple); color: #fff; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.2s; background-image: linear-gradient(135deg, #af52de 0%, #8b2ec4 100%);
            box-shadow: 0 4px 15px rgba(175, 82, 222, 0.3);
        }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(175, 82, 222, 0.4); }
        .add-btn:active { transform: translateY(0); }

        .helper-text { font-size: 12px; color: var(--text-sub); text-align: center; margin-top: -4px; }
        .helper-text strong { color: var(--accent-purple); }

        /* --- List Panel --- */
        .list-panel { 
            width: 100%; border: 1px solid var(--card-border); border-radius: 20px; 
            background: rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden;
        }
        
        .list-header { 
            padding: 16px 20px; background: rgba(255,255,255,0.03); 
            border-bottom: 1px solid var(--card-border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .list-header h3 { font-size: 15px; font-weight: 700; color: #fff; }
        .list-count { font-size: 13px; color: var(--text-sub); background: rgba(255,255,255,0.1); padding: 2px 8px; border-radius: 10px; }

        .chapter-list { min-height: 100px; max-height: 400px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        
        .chapter-item { 
            display: flex; align-items: center; gap: 12px; padding: 12px 16px; 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
            border-radius: 12px; transition: background 0.2s; animation: fadeIn 0.3s ease;
        }
        .chapter-item:hover { background: rgba(255,255,255,0.05); }
        
        .chap-time { font-weight: 700; color: var(--accent-purple); font-variant-numeric: tabular-nums; width: 60px; flex-shrink: 0; }
        .chap-title { flex: 1; color: #fff; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .del-btn { 
            background: none; border: none; color: #666; cursor: pointer; 
            padding: 4px; border-radius: 6px; transition: all 0.2s; display: flex;
        }
        .del-btn:hover { color: var(--error-red); background: rgba(255, 59, 48, 0.1); }

        .empty-state { padding: 40px 20px; text-align: center; color: #555; font-size: 14px; font-weight: 500; }

        /* --- Action Area --- */
        .action-area { width: 100%; display: flex; gap: 12px; margin-top: 16px; }
        .btn-clear { 
            padding: 0 20px; height: 56px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1); 
            background: rgba(255,255,255,0.05); color: var(--text-sub); font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-clear:hover { background: rgba(255,255,255,0.1); color: #fff; }
        
        .btn-copy { 
            flex: 1; height: 56px; border-radius: 14px; border: none; background: #fff; color: #000; 
            font-size: 16px; font-weight: 800; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.2s; box-shadow: 0 4px 15px rgba(255,255,255,0.2);
        }
        .btn-copy:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(255,255,255,0.3); }

        /* --- Toast Notification --- */
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); 
            background: rgba(52, 199, 89, 0.9); backdrop-filter: blur(10px);
            color: #fff; padding: 14px 28px; border-radius: 100px; 
            font-weight: 600; font-size: 15px; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 30px rgba(52, 199, 89, 0.3); z-index: 2000; display: flex; align-items: center; gap: 8px;
        }
        .toast.error { background: rgba(255, 59, 48, 0.9); box-shadow: 0 10px 30px rgba(255, 59, 48, 0.3); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Custom Scrollbar */
        .chapter-list::-webkit-scrollbar { width: 6px; }
        .chapter-list::-webkit-scrollbar-track { background: transparent; }
        .chapter-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
        <span class="header-badge">유튜브 챕터 메이커 ⏱️</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>초고�� 타임스탬프 생성</h1>
            <p>숫자만 치면 <b>콜론(:)</b>이 자동 생성됩니다.<br>마우스 없이 <b>Enter</b>키만으로 챕터를 무한 추가하세요.</p>
        </div>

        <!-- AdSense Container -->
        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- 입력 패널 -->
        <div class="input-panel">
            <div class="input-row">
                <div class="time-input-group">
                    <label>시간 (숫자만 입력)</label>
                    <!-- maxlength 6으로 제한하여 10:00:00 까지 커버 -->
                    <input type="text" id="timeInput" placeholder="예: 0130 (01:30)" inputmode="numeric" maxlength="8">
                </div>
                <div class="title-input-group">
                    <label>챕터 제목</label>
                    <input type="text" id="titleInput" placeholder="하이라이트 장면" autocomplete="off">
                </div>
            </div>
            <button class="add-btn" onclick="addChapter()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                목록에 추가 (Enter)
            </button>
            <div class="helper-text">💡 팁: 제목 입력 후 <strong>Enter</strong>를 누르면 바로 추가됩니다.</div>
        </div>

        <!-- 리스트 패널 -->
        <div class="list-panel">
            <div class="list-header">
                <h3>생성된 챕터 목록</h3>
                <span class="list-count" id="listCount">0개</span>
            </div>
            <div class="chapter-list" id="chapterList">
                <div class="empty-state" id="emptyState">
                    아직 추가된 챕터가 없습니다.<br>위에 시간과 제목을 입력하고 추가해보세요!
                </div>
            </div>
        </div>

        <!-- 하단 액션 버튼 -->
        <div class="action-area">
            <button class="btn-clear" onclick="clearAll()">전체 삭제</button>
            <button class="btn-copy" onclick="copyToClipboard()" id="copyBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                유튜브용으로 복사하기
            </button>
        </div>
    </main>

    <!-- 토스트 알림 -->
    <div class="toast" id="toast">알림 메시지</div>

    <script>
        const timeInput = document.getElementById('timeInput');
        const titleInput = document.getElementById('titleInput');
        const chapterList = document.getElementById('chapterList');
        const emptyState = document.getElementById('emptyState');
        const listCount = document.getElementById('listCount');
        const toast = document.getElementById('toast');

        let chapters = [];

        // 1. 시간 오토-포맷팅 (숫자만 치면 : 자동 삽입)
        timeInput.addEventListener('input', function(e) {
            // 숫자만 남기기
            let val = this.value.replace(/[^0-9]/g, '');
            
            // 길이별 콜론 삽입 로직
            if(val.length > 4) { // 1시간 이상 (H:MM:SS)
                val = val.substring(0, val.length - 4) + ':' + val.substring(val.length - 4, val.length - 2) + ':' + val.substring(val.length - 2);
            } else if (val.length > 2) { // 분 단위 (M:SS 또는 MM:SS)
                val = val.substring(0, val.length - 2) + ':' + val.substring(val.length - 2);
            }
            this.value = val;
        });

        // 2. 미친 UX (Enter 키 연동 로직)
        timeInput.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                if(this.value.trim() !== '') titleInput.focus(); // 시간 치고 엔터 -> 제목으로 이동
            }
        });

        titleInput.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') {
                e.preventDefault();
                addChapter(); // 제목 치고 엔터 -> 목록 추가 후 다시 시간 입력창으로
            }
        });

        // 3. 챕터 추가 로직
        function addChapter() {
            const timeVal = timeInput.value.trim();
            const titleVal = titleInput.value.trim();

            if(!timeVal) { showToast('시간을 입력해주세요.', 'error'); timeInput.focus(); return; }
            if(!titleVal) { showToast('제목을 입력해주세요.', 'error'); titleInput.focus(); return; }

            // 데이터 배열에 푸시
            chapters.push({ time: timeVal, title: titleVal });
            renderList();

            // 입력창 초기화 및 커서 복귀 (무한 루프 타이핑용)
            timeInput.value = '';
            titleInput.value = '';
            timeInput.focus();
            
            // 리스트 최하단으로 스크롤 이동
            setTimeout(() => { chapterList.scrollTop = chapterList.scrollHeight; }, 50);
        }

        // 4. 리스트 렌더링 로직
        function renderList() {
            if(chapters.length === 0) {
                emptyState.style.display = 'block';
                listCount.innerText = '0개';
                // 기존 아이템들 삭제
                const items = document.querySelectorAll('.chapter-item');
                items.forEach(item => item.remove());
                return;
            }

            emptyState.style.display = 'none';
            listCount.innerText = `${chapters.length}개`;
            
            // 기존 아이템들 싹 지우고 재렌더링
            const items = document.querySelectorAll('.chapter-item');
            items.forEach(item => item.remove());

            chapters.forEach((chap, index) => {
                const div = document.createElement('div');
                div.className = 'chapter-item';
                div.innerHTML = `
                    <div class="chap-time">${chap.time}</div>
                    <div class="chap-title">${chap.title}</div>
                    <button class="del-btn" onclick="deleteChapter(${index})" title="삭제">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    </button>
                `;
                chapterList.appendChild(div);
            });
        }

        // 5. 개별 삭제 로직
        function deleteChapter(index) {
            chapters.splice(index, 1);
            renderList();
        }

        // 6. 전체 삭제 로직
        function clearAll() {
            if(chapters.length === 0) return;
            if(confirm('모든 챕터 목록을 삭제하시겠습니까?')) {
                chapters = [];
                renderList();
                timeInput.focus();
            }
        }

        // 7. 클립보드 복사 로직 (유튜브 최적화 방어막 포함)
        function copyToClipboard() {
            if(chapters.length === 0) {
                showToast('복사할 챕터가 없습니다.', 'error');
                return;
            }

            let resultText = '';
            
            // 유튜브 챕터 필수 조건 방어: 첫 챕터는 무조건 00:00 로 시작해야함
            // 사용자가 00:00을 안 넣었을 경우 경고 문구 추가 삽입
            if(chapters[0].time !== '00:00' && chapters[0].time !== '0:00') {
                resultText += '00:00 도입부 (자동추가)\n';
            }

            chapters.forEach(chap => {
                resultText += `${chap.time} ${chap.title}\n`;
            });

            navigator.clipboard.writeText(resultText).then(() => {
                showToast('<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><polyline points="20 6 9 17 4 12"></polyline></svg> 성공적으로 복사되었습니다!', 'success');
            }).catch(() => {
                // 구형 브라우저 Fallback
                const temp = document.createElement('textarea');
                temp.value = resultText;
                document.body.appendChild(temp);
                temp.select();
                document.execCommand('copy');
                document.body.removeChild(temp);
                showToast('<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><polyline points="20 6 9 17 4 12"></polyline></svg> 성공적으로 복사되었습니다!', 'success');
            });
        }

        // 8. 토스트 UI 함수
        let toastTimeout;
        function showToast(msg, type = 'success') {
            toast.innerHTML = msg;
            if(type === 'error') {
                toast.classList.add('error');
            } else {
                toast.classList.remove('error');
            }
            
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }
    </script>
</body>
</html>
