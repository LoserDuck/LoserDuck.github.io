    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff;
            --text-sub: #8b95a1;
            --accent-green: #34c759;
            --accent-blue: #3182f6;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Inter", sans-serif; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-title); 
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header --- */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--card-border); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(52, 199, 89, 0.15); border: 1px solid rgba(52, 199, 89, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-green); font-weight: 700; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 500px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 32px; animation: fadeIn 0.6s ease-out; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; word-break: keep-all; }

        /* --- Ad Box --- */
        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- Calculator UI --- */
        .app-box { 
            width: 100%; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 24px; 
            padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Toggle Switch */
        .toggle-container { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 4px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .toggle-btn { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: 700; color: var(--text-sub); cursor: pointer; position: relative; z-index: 2; transition: color 0.3s; }
        .toggle-btn.active { color: #fff; }
        .toggle-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: rgba(255,255,255,0.1); border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; }
        .mode-reverse .toggle-slider { transform: translateX(100%); }

        /* Input Area */
        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 14px; font-weight: 600; color: var(--text-sub); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { 
            width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 16px; padding: 20px; padding-right: 45px;
            color: #fff; font-size: 24px; font-weight: 800; letter-spacing: 1px;
            outline: none; transition: all 0.3s; text-align: right;
        }
        .input-wrapper input:focus { border-color: var(--accent-green); box-shadow: 0 0 0 4px rgba(52, 199, 89, 0.1); }
        .input-wrapper input::placeholder { color: #444; font-weight: 500; }
        .input-suffix { position: absolute; right: 20px; font-size: 18px; font-weight: 600; color: var(--text-sub); pointer-events: none; }

        /* Result Area */
        .result-box { 
            background: rgba(52, 199, 89, 0.05); border: 1px solid rgba(52, 199, 89, 0.2); 
            border-radius: 16px; padding: 24px; margin-top: 8px; display: flex; flex-direction: column; gap: 16px;
            overflow: hidden; /* 영역 이탈 방지 */
        }
        
        .result-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 15px; color: var(--text-sub); gap: 12px; }
        .result-row .label { flex-shrink: 0; white-space: nowrap; }
        /* 긴 숫자 줄바꿈 허용 로직 */
        .result-row .value { 
            font-weight: 600; color: #fff; font-variant-numeric: tabular-nums; 
            text-align: right; word-break: break-all; word-wrap: break-word; 
        }
        .result-row.deduction .value { color: var(--accent-pink); }
        
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
        
        .result-final { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; margin-top: 8px; width: 100%; }
        .result-final .label { font-size: 15px; font-weight: 700; color: #fff; }
        
        /* 최종 금액 반응형 & 삐져나옴 방지 */
        .result-final .amount-wrapper {
            width: 100%;
            display: flex; justify-content: flex-end; align-items: baseline; gap: 6px;
            word-break: break-all; word-wrap: break-word; text-align: right;
        }
        .result-final .amount { 
            font-size: clamp(24px, 7vw, 36px); /* 숫자가 길어지면 폰트 자동 축소 */
            font-weight: 800; color: var(--accent-green); letter-spacing: -1px; 
            text-shadow: 0 0 20px rgba(52, 199, 89, 0.3); font-variant-numeric: tabular-nums; 
            line-height: 1.2;
        }
        .result-final .unit { font-size: 20px; font-weight: 600; color: #fff; flex-shrink: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- ⚡ 1SecTools 공통 글로벌 헤더 -->
    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100">
                <defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs>
                <path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/>
            </svg>
            1SecTools
        </a>
        <span class="header-badge">3.3% 프리랜서 계산기 💸</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>3.3% 세금 계산기</h1>
            <p>프리랜서, 알바, 외주 작업자를 위한 필수 툴.<br>계약 금액을 입력하면 실수령액을 1초 만에 보여줍니다.</p>
        </div>

        <!-- Google AdSense Container -->
        <div class="ad-container">
            <ins class="adsbygoogle"
                 style="display:block; text-align:center;"
                 data-ad-layout="in-article"
                 data-ad-format="fluid"
                 data-ad-client="ca-pub-7273110716268085"
                 data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>
                 (adsbygoogle = window.adsbygoogle || []).push({});
            </script>
        </div>

        <div class="app-box">
            <!-- 계산 모드 토글 스위치 -->
            <div class="toggle-container" id="modeToggle">
                <div class="toggle-slider"></div>
                <div class="toggle-btn active" onclick="setMode('forward')">세전 → 세후 (실수령액)</div>
                <div class="toggle-btn" onclick="setMode('reverse')">세후 → 세전 (계약금액)</div>
            </div>

            <!-- 입력 영역 -->
            <div class="input-group">
                <label id="inputLabel">💰 계약 금액 (세전) 입력</label>
                <div class="input-wrapper">
                    <input type="text" id="amountInput" placeholder="0" inputmode="numeric" autocomplete="off" maxlength="20">
                    <span class="input-suffix">원</span>
                </div>
            </div>

            <!-- 결과 영역 -->
            <div class="result-box">
                <div class="result-row" id="row1">
                    <span class="label">세전 금액</span>
                    <span class="value" id="valBefore">0 원</span>
                </div>
                <div class="result-row deduction">
                    <span class="label">소득세 (3.0%)</span>
                    <span class="value" id="valTax1">- 0 원</span>
                </div>
                <div class="result-row deduction">
                    <span class="label">지방소득세 (0.3%)</span>
                    <span class="value" id="valTax2">- 0 원</span>
                </div>
                <div class="divider"></div>
                <div class="result-final">
                    <div class="label" id="finalLabel">최종 실수령액 (세후)</div>
                    <div class="amount-wrapper">
                        <span class="amount" id="valFinal">0</span> 
                        <span class="unit">원</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const input = document.getElementById('amountInput');
        const modeToggle = document.getElementById('modeToggle');
        const inputLabel = document.getElementById('inputLabel');
        const finalLabel = document.getElementById('finalLabel');
        
        const valBefore = document.getElementById('valBefore');
        const valTax1 = document.getElementById('valTax1');
        const valTax2 = document.getElementById('valTax2');
        const valFinal = document.getElementById('valFinal');

        let isReverseMode = false;

        // 천단위 콤마 생성 함수
        const formatNumber = (num) => {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        };

        // 콤마 제거 및 숫자만 추출
        const cleanNumber = (str) => {
            return parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;
        };

        // 모드 변경 (세전->세후 vs 세후->세전)
        function setMode(mode) {
            const btns = document.querySelectorAll('.toggle-btn');
            
            if(mode === 'reverse') {
                isReverseMode = true;
                modeToggle.classList.add('mode-reverse');
                btns[0].classList.remove('active');
                btns[1].classList.add('active');
                
                inputLabel.innerText = '💰 받은 금액 (실수령액) 입력';
                document.getElementById('row1').querySelector('.label').innerText = '계약해야 할 세전 금액';
                finalLabel.innerText = '원래 계약 금액 (세전)';
            } else {
                isReverseMode = false;
                modeToggle.classList.remove('mode-reverse');
                btns[0].classList.add('active');
                btns[1].classList.remove('active');
                
                inputLabel.innerText = '💰 계약 금액 (세전) 입력';
                document.getElementById('row1').querySelector('.label').innerText = '세전 금액';
                finalLabel.innerText = '최종 실수령액 (세후)';
            }
            
            calculate(); // 모드 변경 시 즉시 재계산
        }

        // 입력창 이벤트 (콤마 자동 입력 및 계산)
        input.addEventListener('input', function(e) {
            let start = this.selectionStart;
            let originalLen = this.value.length;
            
            let num = cleanNumber(this.value);
            if(num === 0) {
                this.value = '';
            } else {
                this.value = formatNumber(num);
            }
            
            let newLen = this.value.length;
            this.setSelectionRange(start + (newLen - originalLen), start + (newLen - originalLen));

            calculate();
        });

        // 메인 계산 로직
        function calculate() {
            let inputAmount = cleanNumber(input.value);
            
            if (inputAmount === 0 || isNaN(inputAmount)) {
                valBefore.innerText = "0 원";
                valTax1.innerText = "- 0 원";
                valTax2.innerText = "- 0 원";
                valFinal.innerText = "0";
                return;
            }

            // Javascript Max Safe Integer 방어 (약 900경)
            if(inputAmount > 9000000000000000) {
                inputAmount = 9000000000000000;
                input.value = formatNumber(inputAmount);
            }

            let beforeTax = 0;
            let tax1 = 0;
            let tax2 = 0;
            let afterTax = 0;

            if (!isReverseMode) {
                beforeTax = inputAmount;
                tax1 = Math.floor(beforeTax * 0.03 / 10) * 10; 
                tax2 = Math.floor(beforeTax * 0.003 / 10) * 10;
                afterTax = beforeTax - tax1 - tax2;
            } else {
                afterTax = inputAmount;
                beforeTax = Math.ceil(afterTax / 0.967 / 10) * 10;
                tax1 = Math.floor(beforeTax * 0.03 / 10) * 10; 
                tax2 = Math.floor(beforeTax * 0.003 / 10) * 10;
                
                if (beforeTax - tax1 - tax2 !== afterTax) {
                    beforeTax += 10;
                    tax1 = Math.floor(beforeTax * 0.03 / 10) * 10; 
                    tax2 = Math.floor(beforeTax * 0.003 / 10) * 10;
                }
            }

            // 화면 렌더링
            if(!isReverseMode) {
                valBefore.innerText = formatNumber(beforeTax) + " 원";
                valFinal.innerText = formatNumber(afterTax);
            } else {
                valBefore.innerText = formatNumber(afterTax) + " 원 (받은 돈)";
                valFinal.innerText = formatNumber(beforeTax);
            }
            
            valTax1.innerText = "- " + formatNumber(tax1) + " 원";
            valTax2.innerText = "- " + formatNumber(tax2) + " 원";
        }
    </script>
</body>
</html>
