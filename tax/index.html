    <style>
        :root { 
            --bg-base: #030305; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); 
            --text-title: #ffffff; --text-sub: #8b95a1; --accent-green: #34c759; --accent-pink: #ff2d55; 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-title); min-height: 100vh; display: flex; flex-direction: column; -webkit-font-smoothing: antialiased; overflow-x: hidden; }

        /* 🚨 하위 툴 페이지 헤더: 좌우 끝으로 밀착되도록 24px 패딩 적용 */
        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        
        /* 🚨 메인 로고 폰트(Inter) 100% 적용 */
        .header-logo { font-family: 'Inter', sans-serif; display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }
        .header-badge { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: rgba(52, 199, 89, 0.15); border: 1px solid rgba(52, 199, 89, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-green); font-weight: 700; }

        .scale-wrapper { width: 100%; display: flex; flex-direction: column; align-items: center; flex: 1; transform-origin: top center; }
        @media (min-width: 2500px) { .scale-wrapper { transform: scale(1.3); margin-bottom: 250px; } }
        @media (min-width: 3800px) { .scale-wrapper { transform: scale(1.7); margin-bottom: 450px; } }

        .main { padding: 60px 20px 40px; width: 100%; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; }
        
        .title-sec { text-align: center; margin-bottom: 28px; animation: fadeInDown 0.6s cubic-bezier(0.16, 1, 0.3, 1); display: flex; flex-direction: column; align-items: center; }
        .title-sec h1 { font-size: clamp(28px, 5vw, 36px); font-weight: 800; margin-bottom: 12px; letter-spacing: -1px; line-height: 1.3; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; margin-bottom: 16px; }

        /* 🔥 상단 보안 마케팅 뱃지 */
        .secure-badge { 
            display: inline-flex; align-items: center; gap: 6px; 
            background: rgba(52, 199, 89, 0.05); border: 1px solid rgba(52, 199, 89, 0.3); 
            padding: 8px 16px; border-radius: 100px; 
            font-size: 13px; font-weight: 700; color: var(--accent-green); 
            box-shadow: 0 4px 15px rgba(52, 199, 89, 0.1);
        }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .app-box { width: 100%; background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid var(--card-border); border-radius: 24px; padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }

        .toggle-container { display: flex; background: rgba(0,0,0,0.4); border-radius: 12px; padding: 4px; position: relative; border: 1px solid rgba(255,255,255,0.05); }
        .toggle-btn { flex: 1; text-align: center; padding: 12px; font-size: 14px; font-weight: 700; color: var(--text-sub); cursor: pointer; position: relative; z-index: 2; transition: color 0.3s; }
        .toggle-btn.active { color: #fff; }
        .toggle-slider { position: absolute; top: 4px; left: 4px; width: calc(50% - 4px); height: calc(100% - 8px); background: rgba(255,255,255,0.1); border-radius: 8px; transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 1; }
        .mode-reverse .toggle-slider { transform: translateX(100%); }

        .input-group { display: flex; flex-direction: column; gap: 10px; }
        .input-group label { font-size: 14px; font-weight: 600; color: var(--text-sub); }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 20px 45px 20px 20px; color: #fff; font-size: 26px; font-weight: 800; text-align: right; outline: none; transition: border 0.3s; letter-spacing: 1px; }
        .input-wrapper input:focus { border-color: var(--accent-green); box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.15); }
        .input-suffix { position: absolute; right: 20px; font-size: 18px; font-weight: 600; color: var(--text-sub); pointer-events: none; }

        .result-box { background: rgba(52, 199, 89, 0.05); border: 1px solid rgba(52, 199, 89, 0.2); border-radius: 16px; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
        .result-row { display: flex; justify-content: space-between; align-items: flex-start; font-size: 15px; color: var(--text-sub); gap: 16px; width: 100%; }
        .result-row .label { flex-shrink: 0; }
        .result-row .value { font-weight: 600; color: #fff; text-align: right; flex: 1; min-width: 0; word-break: break-all; }
        .result-row.deduction .value { color: var(--accent-pink); }
        
        .divider { height: 1px; background: rgba(255,255,255,0.08); margin: 4px 0; }
        
        .result-final { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; width: 100%; }
        .result-final .label { font-size: 15px; font-weight: 700; color: #fff; }
        .result-final .amount-wrapper { width: 100%; display: flex; justify-content: flex-end; align-items: baseline; gap: 6px; flex-wrap: wrap; }
        .result-final .amount { font-size: clamp(28px, 8vw, 38px); font-weight: 900; color: var(--accent-green); line-height: 1.2; text-align: right; word-break: break-all; text-shadow: 0 0 20px rgba(52, 199, 89, 0.3); letter-spacing: -1px; }

        /* 하단 푸터 */
        .footer { width: 100%; border-top: 1px solid var(--card-border); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); margin-top: auto; }
        .footer-logo { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 900; color: #555; letter-spacing: -0.5px; }
        .footer-copy { font-family: 'Inter', sans-serif; color: #555; font-size: 13px; font-weight: 500; text-align: center; line-height: 1.5; }
        
        /* 🚨 CEO님 시그니처를 위한 스타일 추가 */
        .duck-logo { color: #888; font-weight: 700; transition: color 0.3s; }
        .duck-logo:hover { color: #fff; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>

<body>
    <header class="header">
        <a href="../" class="header-logo">
            <svg width="28" height="28" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
        <span class="header-badge">3.3% 계산기</span>
    </header>

    <div class="scale-wrapper">
        <main class="main">
            <div class="title-sec">
                <h1>3.3% 세금 계산기</h1>
                <p>계약 금액을 입력하면 실수령액을 1초 만에 보여줍니다.</p>
                <!-- 🔥 최상단 보안 마케팅 뱃지 배치 -->
                <div class="secure-badge">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                    100% 안전: 브라우저 자체 처리 (서버 저장 X)
                </div>
            </div>

            <!-- 실제 광고 노출 영역 -->
            <div class="ad-container"><ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>

            <div class="app-box">
                <div class="toggle-container" id="modeToggle">
                    <div class="toggle-slider"></div>
                    <div class="toggle-btn active" onclick="setMode('forward')">세전 → 세후</div>
                    <div class="toggle-btn" onclick="setMode('reverse')">세후 → 세전</div>
                </div>

                <div class="input-group">
                    <label id="inputLabel">💰 계약 금액 (세전) 입력</label>
                    <div class="input-wrapper">
                        <input type="text" id="amountInput" placeholder="0" inputmode="numeric" maxlength="20">
                        <span class="input-suffix">원</span>
                    </div>
                </div>

                <div class="result-box">
                    <div class="result-row" id="row1"><span class="label">세전 금액</span><span class="value" id="valBefore">0 원</span></div>
                    <div class="result-row deduction"><span class="label">소득세 (3.0%)</span><span class="value" id="valTax1">- 0 원</span></div>
                    <div class="result-row deduction"><span class="label">지방소득세 (0.3%)</span><span class="value" id="valTax2">- 0 원</span></div>
                    <div class="divider"></div>
                    <div class="result-final">
                        <div class="label" id="finalLabel">최종 실수령액 (세후)</div>
                        <div class="amount-wrapper"><span class="amount" id="valFinal">0</span> <span class="unit" style="color:#fff;font-weight:600;font-size:20px;">원</span></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <footer class="footer">
        <div class="footer-logo">1SecTools</div>
        <!-- 🚨 CEO님 시그니처 추가 -->
        <div class="footer-copy">
            &copy; 2026 1SecTools. All rights reserved.<br>
            Designed & Engineered by <span class="duck-logo">🦆 LoserDuck</span>
        </div>
    </footer>

    <script>
        const input = document.getElementById('amountInput');
        const modeToggle = document.getElementById('modeToggle');
        const inputLabel = document.getElementById('inputLabel');
        const finalLabel = document.getElementById('finalLabel');
        const valBefore = document.getElementById('valBefore');
        const valTax1 = document.getElementById('valTax1');
        const valTax2 = document.getElementById('valTax2');
        const valFinal = document.getElementById('valFinal');
        let isReverseMode = false;

        const formatNumber = (num) => num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        const cleanNumber = (str) => parseInt(str.replace(/[^0-9]/g, ''), 10) || 0;

        function setMode(mode) {
            const btns = document.querySelectorAll('.toggle-btn');
            if(mode === 'reverse') {
                isReverseMode = true; modeToggle.classList.add('mode-reverse');
                btns[0].classList.remove('active'); btns[1].classList.add('active');
                inputLabel.innerText = '💰 받은 금액 (실수령액) 입력';
                document.getElementById('row1').querySelector('.label').innerText = '계약해야 할 금액';
                finalLabel.innerText = '원래 계약 금액 (세전)';
            } else {
                isReverseMode = false; modeToggle.classList.remove('mode-reverse');
                btns[0].classList.add('active'); btns[1].classList.remove('active');
                inputLabel.innerText = '💰 계약 금액 (세전) 입력';
                document.getElementById('row1').querySelector('.label').innerText = '세전 금액';
                finalLabel.innerText = '최종 실수령액 (세후)';
            }
            calculate();
            input.focus();
        }

        input.addEventListener('input', function() {
            let start = this.selectionStart; let originalLen = this.value.length;
            let num = cleanNumber(this.value);
            this.value = num === 0 ? '' : formatNumber(num);
            let newLen = this.value.length;
            this.setSelectionRange(start + (newLen - originalLen), start + (newLen - originalLen));
            calculate();
        });

        function calculate() {
            let amt = cleanNumber(input.value);
            if (amt === 0) { valBefore.innerText="0 원"; valTax1.innerText="- 0 원"; valTax2.innerText="- 0 원"; valFinal.innerText="0"; return; }
            if(amt > 9000000000000000) { amt = 9000000000000000; input.value = formatNumber(amt); }

            let bef=0, t1=0, t2=0, aft=0;
            if (!isReverseMode) {
                bef = amt; t1 = Math.floor(bef * 0.03 / 10) * 10; t2 = Math.floor(bef * 0.003 / 10) * 10; aft = bef - t1 - t2;
            } else {
                aft = amt; bef = Math.ceil(aft / 0.967 / 10) * 10;
                t1 = Math.floor(bef * 0.03 / 10) * 10; t2 = Math.floor(bef * 0.003 / 10) * 10;
                if (bef - t1 - t2 !== aft) { bef += 10; t1 = Math.floor(bef * 0.03 / 10) * 10; t2 = Math.floor(bef * 0.003 / 10) * 10; }
            }

            if(!isReverseMode) { valBefore.innerText=formatNumber(bef)+" 원"; valFinal.innerText=formatNumber(aft); }
            else { valBefore.innerText=formatNumber(aft)+" 원 (받은 돈)"; valFinal.innerText=formatNumber(bef); }
            valTax1.innerText = "- " + formatNumber(t1) + " 원"; valTax2.innerText = "- " + formatNumber(t2) + " 원";
        }
    </script>
</body>
