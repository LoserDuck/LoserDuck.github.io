<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='grad' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='%233182f6'/><stop offset='100%' stop-color='%23ff2d55'/></linearGradient></defs><rect width='100' height='100' rx='25' fill='%23191f28'/><path d='M60 20 L25 60 L45 60 L40 85 L75 45 L55 45 Z' fill='url(%23grad)'/></svg>">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7273110716268085" crossorigin="anonymous"></script>

    <style>
        :root { --bg-base: #030305; --card-bg: rgba(255, 255, 255, 0.03); --card-border: rgba(255, 255, 255, 0.08); --text-title: #ffffff; --text-sub: #8b95a1; --accent-pink: #ff2d55; --accent-green: #34c759; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-base); color: var(--text-title); min-height: 100vh; display: flex; flex-direction: column; }

        .header { position: sticky; top: 0; z-index: 1000; background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; }
        .header-badge { background: rgba(255, 45, 85, 0.15); border: 1px solid rgba(255, 45, 85, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-pink); font-weight: 700; }

        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 650px; margin: 0 auto; }
        .title-sec { text-align: center; margin-bottom: 32px; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; }

        .input-panel { width: 100%; background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 20px; padding: 24px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 24px; }
        .input-panel input { width: 100%; height: 56px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 0 20px; color: #fff; font-size: 16px; outline: none; }
        .input-panel input:focus { border-color: var(--accent-pink); }

        .result-panel { width: 100%; display: none; flex-direction: column; gap: 20px; }
        .thumb-card { background: var(--card-bg); border: 1px solid var(--card-border); border-radius: 16px; overflow: hidden; display: flex; flex-direction: column; }
        .thumb-img-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
        .thumb-img-wrapper img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        
        .thumb-info { padding: 16px; display: flex; justify-content: space-between; align-items: center; }
        .res-text { color: var(--text-sub); font-size: 14px; font-weight: 600; }
        .btn-download { padding: 12px 24px; background: #fff; color: #000; border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 14px; }

        @media (min-width: 2500px) {
            .main { max-width: 800px; }
            .title-sec h1 { font-size: 44px; }
            .input-panel input { height: 64px; font-size: 20px; }
            .res-text, .btn-download { font-size: 18px; }
        }

        .footer { width: 100%; border-top: 1px solid var(--card-border); padding: 40px 20px; display: flex; flex-direction: column; align-items: center; gap: 12px; background: rgba(0,0,0,0.3); margin-top: auto; }
        .footer-logo { font-size: 20px; font-weight: 900; color: #555; }
        .secure-text { font-size: 12px; font-weight: 600; color: var(--accent-green); display: flex; align-items: center; gap: 4px; }
        .footer-copy { color: #555; font-size: 13px; font-weight: 500; text-align: center; }
    </style>
</head>
<body>
    <header class="header">
        <a href="../" class="header-logo"><svg width="24" height="24" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>1SecTools</a>
        <span class="header-badge">HD Thumb 🔴</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>HD Thumbnail Downloader</h1>
            <p>Paste any YouTube link. We'll extract the 4K/HD thumbnail.</p>
        </div>

        <div class="ad-container"><ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins><script>(adsbygoogle = window.adsbygoogle || []).push({});</script></div>

        <div class="input-panel">
            <input type="text" id="urlInput" placeholder="Paste YouTube link here...">
        </div>

        <div class="result-panel" id="resultPanel">
            <div class="thumb-card" id="cardMax" style="display:none;">
                <div class="thumb-img-wrapper"><img id="imgMax" src="" alt="MaxRes"></div>
                <div class="thumb-info"><span class="res-text">Max Quality (1280x720)</span><a id="btnMax" href="#" target="_blank" class="btn-download">Open Image</a></div>
            </div>
            <div class="thumb-card" id="cardHigh" style="display:none;">
                <div class="thumb-img-wrapper"><img id="imgHigh" src="" alt="HighRes"></div>
                <div class="thumb-info"><span class="res-text">Standard (480x360)</span><a id="btnHigh" href="#" target="_blank" class="btn-download">Open Image</a></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">1SecTools</div>
        <div class="secure-text"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg> 100% Secure: No Data Saved</div>
        <div class="footer-copy">&copy; 2026 1SecTools. All rights reserved.</div>
    </footer>

    <script>
        const input = document.getElementById('urlInput');
        const resultPanel = document.getElementById('resultPanel');
        const cardMax = document.getElementById('cardMax'); const cardHigh = document.getElementById('cardHigh');
        const imgMax = document.getElementById('imgMax'); const imgHigh = document.getElementById('imgHigh');
        const btnMax = document.getElementById('btnMax'); const btnHigh = document.getElementById('btnHigh');

        input.addEventListener('input', function() {
            const match = this.value.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^"&?\/\s]{11})/);
            if (match) {
                const id = match[1];
                const maxUrl = `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`;
                const highUrl = `https://i.ytimg.com/vi/${id}/hqdefault.jpg`;
                
                const testImg = new Image();
                testImg.onload = function() {
                    resultPanel.style.display = 'flex';
                    if (testImg.naturalWidth > 120) { imgMax.src = maxUrl; btnMax.href = maxUrl; cardMax.style.display = 'flex'; }
                    imgHigh.src = highUrl; btnHigh.href = highUrl; cardHigh.style.display = 'flex';
                };
                testImg.src = maxUrl;
            } else { resultPanel.style.display = 'none'; cardMax.style.display = 'none'; cardHigh.style.display = 'none'; }
        });
    </script>
</body>
</html>
