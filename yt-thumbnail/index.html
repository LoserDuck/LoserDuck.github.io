    <style>
        :root {
            --bg-base: #030305;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-title: #ffffff;
            --text-sub: #8b95a1;
            --accent-pink: #ff2d55;
            --accent-blue: #3182f6;
            --error-red: #ff3b30;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-title); 
            min-height: 100vh; display: flex; flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Global Header --- */
        .header { 
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(3, 3, 5, 0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--card-border); 
            padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; 
        }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 800; font-size: 18px; letter-spacing: -0.5px;}
        .header-badge { background: rgba(255, 45, 85, 0.15); border: 1px solid rgba(255, 45, 85, 0.3); padding: 6px 12px; border-radius: 20px; font-size: 12px; color: var(--accent-pink); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        /* --- Main Content --- */
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; width: 100%; max-width: 700px; margin: 0 auto; }
        
        .title-sec { text-align: center; margin-bottom: 32px; animation: fadeIn 0.6s ease-out; }
        .title-sec h1 { font-size: clamp(24px, 5vw, 32px); font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(135deg, #fff, #a1a1aa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .title-sec p { color: var(--text-sub); font-size: 15px; line-height: 1.6; word-break: keep-all; }

        .ad-container { width: 100%; min-height: 90px; background: rgba(255,255,255,0.01); border: 1px dashed rgba(255,255,255,0.05); border-radius: 16px; margin-bottom: 24px; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        /* --- Search App UI --- */
        .app-box { 
            width: 100%; background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 24px; 
            padding: 32px 24px; display: flex; flex-direction: column; gap: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .search-wrapper { position: relative; width: 100%; display: flex; flex-direction: column; gap: 12px; }
        .search-wrapper input { 
            width: 100%; height: 60px; background: rgba(0,0,0,0.4); 
            border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; 
            padding: 0 24px; color: #fff; font-size: 16px; outline: none; transition: all 0.3s; 
        }
        .search-wrapper input:focus { border-color: var(--accent-pink); box-shadow: 0 0 0 4px rgba(255, 45, 85, 0.15); }
        .search-wrapper input::placeholder { color: #555; }
        
        .btn-extract { 
            width: 100%; height: 60px; border-radius: 16px; font-size: 16px; font-weight: 800; 
            background: var(--accent-pink); color: #fff; border: none; cursor: pointer;
            display: flex; justify-content: center; align-items: center; gap: 10px;
            transition: all 0.2s; background-image: linear-gradient(135deg, #ff2d55 0%, #e01b41 100%);
            box-shadow: 0 8px 20px rgba(255, 45, 85, 0.3); text-transform: uppercase; letter-spacing: 0.5px;
        }
        .btn-extract:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(255, 45, 85, 0.4); }
        .btn-extract:active { transform: translateY(0); }

        /* --- Preview Area --- */
        .preview-area { 
            display: none; /* hidden by default */
            flex-direction: column; gap: 16px; margin-top: 10px; 
            animation: fadeIn 0.5s ease-out forwards;
        }
        
        .img-container { 
            width: 100%; aspect-ratio: 16 / 9; background: #000; 
            border-radius: 16px; border: 1px solid rgba(255,255,255,0.1); 
            overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .img-container img { width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.4s; }
        .img-container img.loaded { opacity: 1; }

        /* Loading Spinner */
        .loader { 
            position: absolute; width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); 
            border-top-color: var(--accent-pink); border-radius: 50%; animation: spin 1s linear infinite; display: none; 
        }

        .btn-download { 
            width: 100%; height: 56px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.2); 
            background: #fff; color: #000; font-size: 16px; font-weight: 800; cursor: pointer; 
            display: flex; justify-content: center; align-items: center; gap: 8px;
            transition: all 0.2s; text-decoration: none;
        }
        .btn-download:hover { background: #f0f0f0; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(255,255,255,0.2); }

        /* --- Footer Brand --- */
        .footer-brand { margin-top: 40px; margin-bottom: 20px; font-size: 13px; font-weight: 600; color: #555; text-align: center; width: 100%; }
        .powered-by { font-weight: 400; color: #777; margin-top: 6px; font-size: 12px; }
        .duck-logo { color: #fff; }

        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(20px); 
            background: rgba(255, 45, 85, 0.9); backdrop-filter: blur(10px);
            color: #fff; padding: 14px 28px; border-radius: 100px; 
            font-weight: 600; font-size: 15px; opacity: 0; pointer-events: none; 
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            box-shadow: 0 10px 30px rgba(255, 45, 85, 0.3); z-index: 2000; 
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

<body>

    <header class="header">
        <a href="../" class="header-logo">
            <svg width="24" height="24" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
        <span class="header-badge">YT Thumbnail 🔴</span>
    </header>

    <main class="main">
        <div class="title-sec">
            <h1>HD Thumbnail Extractor</h1>
            <p>Paste any YouTube link (Standard or Shorts) below.<br>Extracts the highest quality 4K/HD thumbnail instantly.</p>
        </div>

        <div class="ad-container">
            <ins class="adsbygoogle" style="display:block; text-align:center;" data-ad-layout="in-article" data-ad-format="fluid" data-ad-client="ca-pub-7273110716268085" data-ad-slot="YOUR_AD_SLOT_HERE"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="app-box">
            <div class="search-wrapper">
                <input type="text" id="ytUrl" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off">
                <button class="btn-extract" onclick="extractThumbnail()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    Extract Thumbnail
                </button>
            </div>

            <!-- Preview UI -->
            <div class="preview-area" id="previewArea">
                <div class="img-container">
                    <div class="loader" id="loader"></div>
                    <img id="thumbImg" src="" alt="YouTube Thumbnail">
                </div>
                <a href="#" id="downloadBtn" class="btn-download" target="_blank" download="thumbnail.jpg">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download HD Image
                </a>
            </div>
        </div>

        <!-- 🦆 Footer Branding -->
        <div class="footer-brand">
            <div>&copy; 2026 1SecTools. All rights reserved.</div>
            <div class="powered-by">Powered by <span class="duck-logo">🦆 LoserDuck</span></div>
        </div>
    </main>

    <div class="toast" id="toast">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="margin-right:6px;"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        <span id="toastMsg">Invalid YouTube URL.</span>
    </div>

    <script>
        const ytUrlInput = document.getElementById('ytUrl');
        const previewArea = document.getElementById('previewArea');
        const thumbImg = document.getElementById('thumbImg');
        const loader = document.getElementById('loader');
        const downloadBtn = document.getElementById('downloadBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        // Enter key support
        ytUrlInput.addEventListener('keypress', function(e) {
            if(e.key === 'Enter') extractThumbnail();
        });

        function extractThumbnail() {
            const url = ytUrlInput.value.trim();
            if(!url) { showToast('Please enter a valid YouTube link.'); ytUrlInput.focus(); return; }

            const videoId = getYouTubeID(url);
            if(!videoId) { showToast('Invalid YouTube URL format.'); return; }

            // Show UI and loader
            previewArea.style.display = 'flex';
            thumbImg.classList.remove('loaded');
            loader.style.display = 'block';

            // Construct Best Quality Image URL (maxresdefault)
            // If maxres isn't available, youtube servers fallback to hqdefault
            const imgUrl = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;
            const fallbackUrl = `https://img.youtube.com/vi/${videoId}/hqdefault.jpg`;

            // Test if maxresdefault exists
            const tempImg = new Image();
            tempImg.onload = function() {
                // YouTube returns a 120px wide gray image if maxresdefault is missing
                if (this.width <= 120) {
                    setFinalImage(fallbackUrl, videoId);
                } else {
                    setFinalImage(imgUrl, videoId);
                }
            };
            tempImg.onerror = function() {
                setFinalImage(fallbackUrl, videoId);
            };
            tempImg.src = imgUrl;
        }

        function setFinalImage(url, videoId) {
            thumbImg.src = url;
            thumbImg.onload = () => {
                loader.style.display = 'none';
                thumbImg.classList.add('loaded');
                
                // Set download link
                downloadBtn.href = url;
                // Force download attribute filename
                downloadBtn.download = `youtube_thumb_${videoId}.jpg`;
                
                // Mobile/Chrome cors download fallback
                downloadBtn.onclick = async (e) => {
                    e.preventDefault();
                    try {
                        const response = await fetch(url);
                        const blob = await response.blob();
                        const blobUrl = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = blobUrl;
                        a.download = `youtube_thumb_${videoId}.jpg`;
                        document.body.appendChild(a);
                        a.click();
                        a.remove();
                        window.URL.revokeObjectURL(blobUrl);
                    } catch (error) {
                        // If CORS blocks fetch, open in new tab
                        window.open(url, '_blank');
                    }
                };
            };
        }

        // Ultimate Regex for matching ANY YouTube URL (shorts, watch, youtu.be, embed, etc.)
        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=|\/shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        let toastTimeout;
        function showToast(msg) {
            toastMsg.innerText = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
        }
    </script>
</body>
