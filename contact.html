<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Contact Us | 1SecTools</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800;900&family=Noto+Sans+KR:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg-base: #030305; --card-border: rgba(255, 255, 255, 0.08); --text-title: #ffffff; --text-sub: #8b95a1; --accent-green: #34c759; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', 'Noto Sans KR', sans-serif; }
        
        body { 
            background-color: var(--bg-base); color: var(--text-title); min-height: 100vh; display: flex; flex-direction: column; 
            -webkit-font-smoothing: antialiased; 
            background-image: radial-gradient(circle at 15% 50%, rgba(49, 130, 246, 0.05) 0%, transparent 25%), radial-gradient(circle at 85% 30%, rgba(255, 45, 85, 0.05) 0%, transparent 25%);
            background-attachment: fixed;
        }

        .header { width: 100%; background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(20px); border-bottom: 1px solid var(--card-border); padding: 16px 5%; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: #fff; font-weight: 900; font-size: 20px; letter-spacing: -0.5px; }

        .main { flex: 1; padding: 60px 5% 80px; width: 100%; max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; align-items: center; text-align: center; }
        
        .icon-box { width: 80px; height: 80px; border-radius: 24px; background: rgba(52, 199, 89, 0.1); border: 1px solid rgba(52, 199, 89, 0.3); color: var(--accent-green); display: flex; justify-content: center; align-items: center; margin-bottom: 24px; }
        
        .page-title { font-size: 36px; font-weight: 900; margin-bottom: 16px; letter-spacing: -1px; }
        .page-desc { color: var(--text-sub); font-size: 16px; line-height: 1.6; margin-bottom: 40px; }

        .contact-box { width: 100%; background: rgba(255,255,255,0.02); border: 1px solid var(--card-border); border-radius: 24px; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; transition: all 0.3s; }
        .contact-box:hover { border-color: rgba(255,255,255,0.2); background: rgba(255,255,255,0.04); }
        
        .email-label { font-size: 14px; font-weight: 700; color: var(--text-sub); text-transform: uppercase; letter-spacing: 1px; }
        .email-address { font-size: 24px; font-weight: 800; color: #fff; letter-spacing: 0.5px; }
        
        .mail-btn { margin-top: 10px; display: inline-flex; align-items: center; gap: 8px; padding: 12px 24px; background: #fff; color: #000; border-radius: 12px; font-weight: 700; text-decoration: none; transition: transform 0.2s; }
        .mail-btn:hover { transform: translateY(-2px); }

    </style>
</head>
<body>
    <header class="header">
        <a href="./" class="header-logo">
            <svg width="28" height="28" viewBox="0 0 100 100"><defs><linearGradient id="nav-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3182f6"/><stop offset="100%" stop-color="#ff2d55"/></linearGradient></defs><path d="M60 10 L20 60 L45 60 L35 95 L80 40 L55 40 Z" fill="url(#nav-grad)"/></svg>
            1SecTools
        </a>
    </header>

    <main class="main">
        <div class="icon-box">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
        </div>
        
        <h1 class="page-title">Get in Touch</h1>
        <p class="page-desc">Have a question, feedback, or a feature request? We'd love to hear from you. Drop us an email and we'll get back to you as soon as possible.</p>

        <div class="contact-box">
            <div class="email-label">Developer Email</div>
            <!-- 🚨 CEO님의 실제 이메일 주소로 변경하세요 -->
            <div class="email-address">bdw889900@gmail.com</div>
            <a href="mailto:loserduck@example.com" class="mail-btn">
                Send an Email
            </a>
        </div>
    </main>
</body>
</html>
